# ==========================================
# PathshalaPro - Application Configuration
# ==========================================

spring.application.name=PathshalaPro

# ---- Database ----
spring.datasource.url=jdbc:mysql://localhost:3306/pathshalapro_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- Server ----
server.port=8080
server.servlet.context-path=/api/v1

# ---- JWT ----
app.jwt.secret=PathshalaPro_JWT_Secret_Key_Must_Be_At_Least_256_Bits_Long_For_HS256_Algorithm
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ---- Razorpay ----
razorpay.key.id=rzp_test_placeholder
razorpay.key.secret=rzp_test_placeholder_secret
razorpay.currency=INR

# ---- Mail (SMTP) - Disabled for local dev ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# ---- Logging ----
logging.level.root=INFO
logging.level.com.pathshalapro=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/pathshalapro.log

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ---- Springdoc / Swagger ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.packages-to-scan=com.pathshalapro.controller

# ---- Pagination defaults ----
app.pagination.default-page-size=20
app.pagination.max-page-size=100
