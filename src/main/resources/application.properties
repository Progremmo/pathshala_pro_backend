# ==========================================
# PathshalaPro - Base Configuration
# Profile-specific files override these.
# ==========================================

spring.application.name=PathshalaPro

# ---- Active Profile (override with -Dspring.profiles.active=prod) ----
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ---- Server ----
server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=/api/v1
# Public base URL used by Swagger — override APP_SERVER_URL env var in prod
app.server-url=${APP_SERVER_URL:http://localhost:${PORT:${SERVER_PORT:8080}}}

# ---- JPA / Hibernate (common) ----
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- JWT ----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ---- Razorpay ----
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.currency=INR

# ---- Mail (SMTP) ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ---- Springdoc / Swagger ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.packages-to-scan=com.pathshalapro.controller

# ---- Pagination ----
app.pagination.default-page-size=20
app.pagination.max-page-size=100
