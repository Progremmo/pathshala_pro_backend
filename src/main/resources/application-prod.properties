# ==========================================
# PathshalaPro - PROD Profile
# Active when: spring.profiles.active=prod
# All values MUST come from environment variables on the server.
# ==========================================

# ---- Database ----
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&requireSSL=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- HikariCP (Connection Pool - tuned for production) ----
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ---- Logging - Minimal for production ----
logging.level.root=WARN
logging.level.com.pathshalapro=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.file.name=logs/pathshalapro-prod.log
logging.file.max-size=50MB
logging.file.max-history=30

# ---- Mail - real emails in production ----
# (spring.autoconfigure.exclude is NOT set here, so mail is active)

# ---- Swagger - enabled in production ----
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ---- Server hardening ----
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
