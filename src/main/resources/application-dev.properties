# ==========================================
# PathshalaPro - DEV Profile
# Active when: spring.profiles.active=dev
# ==========================================

# ---- Database ----
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- HikariCP (Connection Pool) ----
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Logging - Verbose for development ----
logging.level.root=INFO
logging.level.com.pathshalapro=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %msg%n
logging.file.name=logs/pathshalapro-dev.log


# ---- Swagger - enabled in dev ----
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
